<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólió | Fotó • Videó • Zene</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --accent: #666666;
            --gap: 2rem;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.6;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
        }

        h1 { font-weight: 600; letter-spacing: -1px; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--accent); font-weight: 300; }

        nav {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid #eee;
            z-index: 100;
        }

        nav a {
            margin: 0 15px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        section { padding: 4rem 0; }
        h2 { border-bottom: 1px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }

        /* Grid rendszer a fotókhoz és videókhoz */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--gap);
        }

        .item {
            background: #f9f9f9;
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .item:hover { transform: translateY(-5px); }

        img, video { width: 100%; display: block; }

        /* Zene szekció stílusa */
        .audio-item {
            background: #f4f4f4;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        footer {
            text-align: center;
            padding: 4rem;
            color: var(--accent);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>MŰVÉSZ NEVE</h1>
    <p class="subtitle">Fotográfus • Videográfus • Zeneszerző</p>
</header>

<nav>
    <a href="#fotok">Fotó</a>
    <a href="#videok">Videó</a>
    <a href="#zenek">Zene</a>
    <a href="#kapcsolat">Kapcsolat</a>
</nav>

<div class="container">
    
    <section id="fotok">
        <h2>Fotográfia</h2>
        <div class="grid">
            <div class="item"><img src="https://via.placeholder.com/600x400" alt="Referencia 1"></div>
            <div class="item"><img src="https://via.placeholder.com/600x800" alt="Referencia 2"></div>
            <div class="item"><img src="https://via.placeholder.com/600x400" alt="Referencia 3"></div>
        </div>
    </section>

    <section id="videok">
        <h2>Videómunkák</h2>
        <div class="grid">
            <div class="item">
                <div style="padding:56.25% 0 0 0;position:relative;"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allowfullscreen></iframe></div>
            </div>
            <div class="item">
                <div style="padding:56.25% 0 0 0;position:relative;"><img src="https://via.placeholder.com/600x337" alt="Video cover"></div>
            </div>
        </div>
    </section>

    <section id="zenek">
        <h2>Zenei referenciák</h2>
        <div class="audio-item">
            <span>Filmzene projekt #1</span>
            <audio controls>
                <source src="your-audio-file.mp3" type="audio/mpeg">
                A böngésződ nem támogatja az audiót.
            </audio>
        </div>
        <div class="audio-item">
            <span>Reklámzene (Ambient)</span>
            <audio controls>
                <source src="your-audio-file-2.mp3" type="audio/mpeg">
            </audio>
        </div>
    </section>

    <section id="kapcsolat" style="text-align: center;">
        <h2>Kapcsolat</h2>
        <p>Dolgozzunk együtt! Várom megkeresésedet az alábbi címen:</p>
        <p><strong>email@neved.hu</strong></p>
    </section>

</div>

<footer>
    &copy; 2024 Minden jog fenntartva.
</footer>

</body>
</html>
